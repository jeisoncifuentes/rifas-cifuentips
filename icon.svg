<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#0d1117"/>
  <rect width="512" height="512" rx="100" fill="url(#g)"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00b45a"/>
      <stop offset="100%" stop-color="#007a3d"/>
    </linearGradient>
  </defs>
  <!-- Ticket shape -->
  <rect x="96" y="140" width="320" height="200" rx="18" fill="#0d1117" opacity="0.85"/>
  <!-- Dashed center line -->
  <line x1="96" y1="240" x2="416" y2="240" stroke="#00b45a" stroke-width="3" stroke-dasharray="12,8" opacity="0.6"/>
  <!-- Notches -->
  <circle cx="96"  cy="240" r="18" fill="#0d1117" opacity="0.95"/>
  <circle cx="416" cy="240" r="18" fill="#0d1117" opacity="0.95"/>
  <!-- Star/number -->
  <text x="256" y="210" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="72" font-weight="900" fill="#00b45a">47</text>
  <text x="256" y="285" text-anchor="middle" font-family="Arial,sans-serif" font-size="26" fill="#39ff8f" opacity="0.85">RIFAS CIFUENTIPS</text>
  <!-- Bottom ribbon -->
  <rect x="140" y="360" width="232" height="36" rx="18" fill="#00b45a"/>
  <text x="256" y="384" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#000">¡Participa y gana!</text>
</svg>
